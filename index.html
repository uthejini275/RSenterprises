<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Enterprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background-color: #f4f4f4;
        }
        header {
            background: #b51a00;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .logo {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 50px;
            margin-right: 10px;
        }
        nav ul {
            list-style: none;
            display: flex;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        nav ul li a:hover {
            color: #ffcccb;
        }
        .menu-icon {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            nav ul {
                display: none;
                flex-direction: column;
                background: #b51a00;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                text-align: center;
            }
            nav ul.show {
                display: flex;
            }
            .menu-icon {
                display: block;
            }
        }
        .slider-container {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }
        .slider {
            display: flex;
            width: 400%;
            transition: transform 0.8s;
        }
        .slide {
            flex: 0 0 100%;
        }
        .slide img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 10px;
            font-size: 20px;
            cursor: pointer;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
        .dots {
            text-align: center;
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .dot {
            height: 10px;
            width: 10px;
            margin: 0 5px;
            background: white;
            border-radius: 50%;
            display: inline-block;
            cursor: pointer;
        }
        .welcome-section {
            text-align: center;
            padding: 20px;
        }
        footer {
            background: #2C0977;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="images/RSE_LOGO_NEW.jpg" alt="RS Enterprises"> RS ENTERPRISES
        </div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>
    <div class="slider-container">
        <div class="slider">
            <div class="slide"><img src="images/HITCHO.jpg" alt="Hitco"></div>
            <div class="slide"><img src="images/BLS_resized.jpg" alt="Blaser"></div>
            <div class="slide"><img src="images/TUNG_resized.jpg" alt="Tungaloy"></div>
            <div class="slide"><img src="images/WENDT_resized.jpg" alt="Wendt"></div>
        </div>
        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>
        <div class="dots">
            <span class="dot" onclick="setSlide(0)"></span>
            <span class="dot" onclick="setSlide(1)"></span>
            <span class="dot" onclick="setSlide(2)"></span>
            <span class="dot" onclick="setSlide(3)"></span>
        </div>
    </div>
    <section class="welcome-section">
        <h2>Welcome to RS Enterprises</h2>
        <p>Your trusted solution provider for customized tooling applications.</p>
    </section>
    <footer>
        <p>&copy; 2025 RS Enterprises. All Rights Reserved.</p>
    </footer>
    <script>
        function toggleMenu() {
            document.getElementById("nav-menu").classList.toggle("show");
        }
        let slideIndex = 0;
        function moveSlide(step) {
            slideIndex = (slideIndex + step + 4) % 4;
            document.querySelector(".slider").style.transform = `translateX(${-slideIndex * 100}%)`;
        }
        function setSlide(index) {
            slideIndex = index;
            document.querySelector(".slider").style.transform = `translateX(${-slideIndex * 100}%)`;
        }
        setInterval(() => moveSlide(1), 7000);
    </script>
</body>
</html>
