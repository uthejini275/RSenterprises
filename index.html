<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Enterprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background-color: #f4f4f4;
        }
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 60px;
            margin-right: 10px;
        }
        .menu-button {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
            font-size: 18px;
            border-radius: 5px;
        }
        .menu-button:hover {
            background: rgba(0, 0, 0, 0.9);
        }
        nav ul {
            list-style: none;
            display: none;
            flex-direction: column;
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px;
            border-radius: 5px;
        }
        nav ul.show {
            display: flex;
        }
        nav ul li {
            margin: 10px 0;
            text-align: center;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            display: block;
        }
        .slider-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }
        .slider {
            display: flex;
            width: 400%;
            transition: transform 0.8s ease-in-out;
        }
        .slide {
            flex: 0 0 100%;
        }
        .slide img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
        }
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 15px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1000;
        }
        .prev { left: 10px; }
        .next { right: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/RSE_LOGO_NEW.jpg" alt="RS Enterprises">
            RS ENTERPRISES
        </div>
        <button class="menu-button" onclick="toggleMenu()">☰ Menu</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <div class="slider-container">
        <div class="slider">
            <div class="slide"><img src="images/HITCHO_resized.jpg" alt="Hitcho"></div>
            <div class="slide"><img src="images/bls_resized.jpg" alt="Blaser"></div>
            <div class="slide"><img src="images/TUNG_resized.jpg" alt="Tungaloy"></div>
            <div class="slide"><img src="images/WENdT_resized.jpg" alt="Wendt"></div>
        </div>
        <button class="prev" onclick="moveSlide(-1)">&#10094;</button>
        <button class="next" onclick="moveSlide(1)">&#10095;</button>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById("nav-menu").classList.toggle("show");
        }

        let slideIndex = 0;
        const slides = document.querySelectorAll(".slide");
        const totalSlides = slides.length;

        function moveSlide(step) {
            slideIndex = (slideIndex + step + totalSlides) % totalSlides;
            updateSlide();
        }

        function updateSlide() {
            document.querySelector(".slider").style.transform = `translateX(${-slideIndex * 100}%)`;
        }

        setInterval(() => moveSlide(1), 7000);
    </script>

</body>
</html>
