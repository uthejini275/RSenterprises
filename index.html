<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RS Enterprises</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }
        body {
            background-color: #f4f4f4;
        }
        header {
            background: #b51a00;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            display: flex;
            align-items: center;
        }
        .logo img {
            height: 60px;
            margin-right: 10px;
        }

        nav ul {
            list-style: none;
            display: flex;
        }
        nav ul li {
            margin: 0 15px;
        }
        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        nav ul li a:hover {
            color: #b51a00;
        }

        .menu-icon {
            display: none;
            font-size: 28px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            nav ul {
                display: none;
                flex-direction: column;
                background: #b51a00;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                text-align: center;
            }
            nav ul.show {
                display: flex;
            }
            nav ul li {
                padding: 10px;
            }
            .menu-icon {
                display: block;
            }
            .hidden-links {
                display: none;
            }
            .expanded .hidden-links {
                display: block;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="images/RSE_LOGO_NEW.jpg" alt="RS Enterprises">
            RS ENTERPRISES
        </div>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html" onclick="expandMenu(event)">Home</a></li>
                <div class="hidden-links">
                    <li><a href="about.html">About</a></li>
                    <li><a href="products.html">Products</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </div>
            </ul>
        </nav>
    </header>

    <script>
        function toggleMenu() {
            document.getElementById("nav-menu").classList.toggle("show");
        }

        function expandMenu(event) {
            event.preventDefault();
            document.getElementById("nav-menu").classList.add("expanded");
        }
    </script>

</body>
</html>
